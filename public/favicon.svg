<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="core" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="14%" stop-color="#67e8f9"/>
      <stop offset="40%" stop-color="#00d4ff"/>
      <stop offset="70%" stop-color="#0a84ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#03060d" stop-opacity="0.9"/>
    </radialGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f9ff" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <!-- Fond -->
  <rect width="64" height="64" rx="14" fill="#03060d"/>

  <!-- Halo extérieur -->
  <circle cx="32" cy="32" r="30" fill="url(#aura)"/>

  <!-- Anneau extérieur en pointillés -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#ring)" stroke-width="1" stroke-dasharray="1.5 3"/>

  <!-- Anneau intermédiaire continu -->
  <circle cx="32" cy="32" r="23" fill="none" stroke="#00d4ff" stroke-width="0.6" opacity="0.55"/>

  <!-- Marqueurs cardinaux -->
  <line x1="32" y1="3" x2="32" y2="6" stroke="#67e8f9" stroke-width="1.4"/>
  <line x1="32" y1="58" x2="32" y2="61" stroke="#67e8f9" stroke-width="1.4"/>
  <line x1="3" y1="32" x2="6" y2="32" stroke="#67e8f9" stroke-width="1.4"/>
  <line x1="58" y1="32" x2="61" y2="32" stroke="#67e8f9" stroke-width="1.4"/>

  <!-- Orbe central -->
  <circle cx="32" cy="32" r="14" fill="url(#core)"/>

  <!-- Spéculaire en haut-gauche pour effet sphère -->
  <ellipse cx="28" cy="26" rx="5" ry="3" fill="#f0f9ff" opacity="0.55"/>

  <!-- Tiny dot au centre -->
  <circle cx="32" cy="32" r="1" fill="#f0f9ff"/>
</svg>
